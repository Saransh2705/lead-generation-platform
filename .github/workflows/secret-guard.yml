name: Secret guard

# Fails the build if a secret-shaped string is ever committed to this PUBLIC repo.
on:
  push:
    branches: [master]
  pull_request:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan tracked files for secret patterns
        run: |
          # Generic patterns only (no real secret values live here).
          PATTERNS='gsk_[A-Za-z0-9]{20,}|vcp_[A-Za-z0-9]{20,}|sb_secret_[A-Za-z0-9]|eyJhbGciOiJ[A-Za-z0-9_-]{20,}|postgresql://[^:@[:space:]]+:[^@[:space:]]+@'
          if git grep -nIE "$PATTERNS" -- . ':(exclude).github/workflows/secret-guard.yml'; then
            echo "::error::A secret-shaped string was found in tracked files. Remove it (use GitHub Actions Secrets / app_config instead)."
            exit 1
          fi
          echo "✅ No committed secrets detected."
