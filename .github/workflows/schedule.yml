name: Run due lead-gen schedules (fallback)

# The primary scheduler is now a Supabase Edge Function invoked every minute by
# pg_cron (see supabase/functions/run-schedules + the lead-gen-run-schedules cron
# job). This workflow is kept as a manual fallback only — the `schedule:` trigger
# is intentionally removed so it can't double-run alongside pg_cron.
on:
  workflow_dispatch: {}       # manual fallback run from the Actions tab / API

concurrency:
  group: run-schedules
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Execute due schedules
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: npx tsx scripts/run-due-schedules.ts
